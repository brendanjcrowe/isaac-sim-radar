# RTX Lidar configuration for Isaac Sim
# Using Ouster OS1 profile as ground-truth comparison sensor
# Isaac Sim 5.0+ API: separate config (sensor family) and variant (resolution/rate)

config: "OS1"
variant: "OS1_REV7_128ch10hz1024res"

# Sensor mount offset relative to robot base_link (meters)
mount_offset:
  x: 0.0
  y: 0.0
  z: 0.5    # top-mounted

# ROS2 output
ros2_topic: "/lidar/point_cloud"
frame_id: "lidar_link"
