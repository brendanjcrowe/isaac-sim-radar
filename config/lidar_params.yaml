# RTX Lidar configuration for Isaac Sim
# Using Ouster OS1-64 as ground-truth comparison sensor
# Isaac Sim 5.0+ API:
#   config  = model family name, matches /Isaac/Sensors/Ouster/OS1/OS1.usd on NVIDIA CDN
#   variant = USD variant name selecting emitter layout (sensorModelConfig attribute)

config: "OS1"
variant: "OS1_REV7_128ch10hz1024res"

# Sensor mount offset relative to robot base_link (meters)
mount_offset:
  x: 0.0
  y: 0.0
  z: 0.5    # top-mounted

# ROS2 output
ros2_topic: "/lidar/point_cloud"
frame_id: "lidar_link"

# UDP output — parsed GMO bytes sent as LDR2 packets to ros2-bridge
udp:
  remote_ip: "239.0.0.1"
  remote_port: 10002
  interface_ip: "0.0.0.0"
