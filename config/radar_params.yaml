# RTX Radar configuration for Isaac Sim
# Using WpmDmatApproxRadar — material-aware, multi-bounce wave propagation model.
# sensorModelPluginName: omni.sensors.nv.radar.wpm_dmatapprox.plugin
# sensorModelConfig:      WpmDmatApproxRadar
# (set on the OmniRadar prim in attach_radar_sensor)
model: "WpmDmatApproxRadar"

# Sensor mount offset relative to robot base_link (meters)
mount_offset:
  x: 0.3    # forward from center
  y: 0.0    # centered laterally
  z: 0.4    # height above base

# Scan configuration — passed as omni:sensor:WpmDmat:scan:s001:* attrs to
# IsaacSensorCreateRtxRadar.  These apply OmniSensorGenericRadarWpmDmatScanCfgAPI:s001,
# which is required for the sensor to produce any output.
scan:
  rBins: 64           # range bins (max detectable range resolution)
  vBins: 32           # Doppler velocity bins
  azBins: 64          # azimuth angle bins
  elBins: 4           # elevation angle bins
  maxRangeM: 100.0    # max detection range (meters)
  raysPerDeg: 2.0     # ray density (rays per degree of FOV)
  maxAzAngDeg: 75.0   # half-FOV azimuth (±75° = 150° total)
  maxElAngDeg: 10.0   # half-FOV elevation (±10° = 20° total)

# UDP output — raw GMO bytes sent to this multicast address each simulation step
udp:
  remote_ip: "127.0.0.1"
  remote_port: 10001
  interface_ip: "0.0.0.0"
